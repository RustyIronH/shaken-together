services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - sqlite-data:/app/data
    environment:
      - PORT=3000
      - DATABASE_PATH=/app/data/shaken.db

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  sqlite-data:
  caddy-data:
  caddy-config:
